<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="40%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1">
      <stop offset="0%" stop-color="rgba(59,130,246,0.15)"/>
      <stop offset="70%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1">
      <stop offset="0%" stop-color="rgba(59,130,246,0.08)"/>
      <stop offset="70%" stop-color="transparent"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1" fill="rgba(59,130,246,0.08)"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <circle cx="1120" cy="50" r="250" fill="url(#glow1)"/>
  <circle cx="60" cy="580" r="300" fill="url(#glow2)"/>

  <!-- Badge -->
  <rect x="420" y="105" width="360" height="40" rx="20" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <text x="600" y="131" text-anchor="middle" fill="#60a5fa" font-family="system-ui,sans-serif" font-size="16" font-weight="600">⚡ 83 Free Tools — No Sign-Up</text>

  <!-- Headline -->
  <text x="600" y="290" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="72" font-weight="800" letter-spacing="-2">Every tool you need,</text>
  <text x="600" y="370" text-anchor="middle" fill="#3b82f6" font-family="system-ui,sans-serif" font-size="72" font-weight="800" letter-spacing="-2">right in your browser</text>

  <!-- Subtitle -->
  <text x="600" y="430" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="22">Free online tools that work locally — no uploads, no accounts.</text>

  <!-- Tool tags -->
  <rect x="385" y="470" width="140" height="32" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="455" y="492" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="14" font-weight="500">🔢 Calculator</text>

  <rect x="535" y="470" width="100" height="32" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="585" y="492" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="14" font-weight="500">📋 JSON</text>

  <rect x="645" y="470" width="120" height="32" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="705" y="492" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="14" font-weight="500">📱 QR Code</text>

  <rect x="775" y="470" width="130" height="32" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="840" y="492" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="14" font-weight="500">🔑 Password</text>

  <!-- URL -->
  <text x="600" y="610" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="16" font-weight="500" letter-spacing="1">lootnestx.com</text>
</svg>
