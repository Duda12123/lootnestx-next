<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;overflow:hidden;font-family:'DM Sans','Space Grotesk',system-ui,sans-serif}
.bg{width:100%;height:100%;background:linear-gradient(135deg,#0a0a0f 0%,#0f172a 40%,#0a1628 100%);position:relative;display:flex;align-items:center;justify-content:center}
.grid{position:absolute;inset:0;background-image:radial-gradient(rgba(59,130,246,.08) 1px,transparent 1px);background-size:32px 32px}
.glow1{position:absolute;top:-80px;right:-80px;width:400px;height:400px;background:radial-gradient(circle,rgba(59,130,246,.15),transparent 70%);border-radius:50%}
.glow2{position:absolute;bottom:-120px;left:-60px;width:500px;height:500px;background:radial-gradient(circle,rgba(59,130,246,.08),transparent 70%);border-radius:50%}
.content{position:relative;text-align:center;z-index:1}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:999px;padding:8px 20px;color:#60a5fa;font-size:16px;font-weight:600;margin-bottom:28px}
.badge svg{width:18px;height:18px}
h1{font-size:72px;font-weight:800;color:#fff;letter-spacing:-0.03em;line-height:1.1}
h1 span{color:#3b82f6}
p{font-size:22px;color:#94a3b8;margin-top:16px;max-width:600px;margin-left:auto;margin-right:auto;line-height:1.5}
.tools{display:flex;gap:10px;justify-content:center;margin-top:32px;flex-wrap:wrap}
.tool{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:6px 14px;color:#cbd5e1;font-size:14px;font-weight:500}
.url{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);color:#475569;font-size:16px;font-weight:500;letter-spacing:0.05em}
</style></head><body>
<div class="bg">
<div class="grid"></div>
<div class="glow1"></div>
<div class="glow2"></div>
<div class="content">
<div class="badge">
<svg fill="none" viewBox="0 0 24 24" stroke="#60a5fa" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
 83 Free Tools — No Sign-Up
</div>
<h1>Every tool you need,<br><span>right in your browser</span></h1>
<p>Free online tools that work locally. Calculators, converters, image editors, developer utilities — no uploads, no accounts.</p>
<div class="tools">
<span class="tool">🔢 Calculator</span><span class="tool">📋 JSON Formatter</span><span class="tool">📱 QR Code</span><span class="tool">🔑 Password</span><span class="tool">🎨 CSS Gradient</span><span class="tool">🖼️ Image Compressor</span>
</div>
</div>
<div class="url">lootnestx.com</div>
</div>
</body></html>
